<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- mark -->
  <g transform="translate(60 60)">
    <rect width="48" height="48" rx="10" fill="#0f172a" stroke="#2dd4bf" stroke-width="2"/>
    <g stroke="#2dd4bf" stroke-width="3" stroke-linecap="round" fill="none">
      <path d="M14 14h9v9"/>
      <path d="M34 14h-9v9"/>
      <path d="M14 34h9v-9"/>
      <path d="M34 34h-9v-9"/>
    </g>
    <circle cx="24" cy="24" r="3" fill="#2dd4bf"/>
  </g>

  <text x="130" y="98" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="#dde3f0">prompt-x-ray</text>

  <text x="60" y="190" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="700" fill="#dde3f0">
    Paste any prompt.
  </text>
  <text x="60" y="258" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="700" fill="url(#acc)">
    See the model see it.
  </text>

  <text x="60" y="316" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#8493b3">
    Tokenizer · Attention · Logit lens · Sampling — synced on one position axis. In-browser.
  </text>

  <!-- four panel mock strip -->
  <g transform="translate(60 380)">
    <!-- tokenizer chips -->
    <g>
      <rect x="0" y="0" width="260" height="170" rx="14" fill="#0f172a" stroke="#1b2740"/>
      <text x="14" y="26" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8493b3">Tokenizer</text>
      <g font-family="JetBrains Mono, monospace" font-size="16" fill="#dde3f0">
        <rect x="14" y="44"  width="46" height="26" rx="4" fill="#1b2740"/><text x="22" y="62">John</text>
        <rect x="64" y="44"  width="34" height="26" rx="4" fill="#1b2740"/><text x="72" y="62">·and</text>
        <rect x="102" y="44" width="42" height="26" rx="4" fill="#2a3149"/><text x="110" y="62">·Mary</text>
        <rect x="148" y="44" width="62" height="26" rx="4" fill="#3a3a3a" stroke="#fbbf24"/><text x="156" y="62">·went</text>
        <rect x="14" y="82"  width="34" height="26" rx="4" fill="#1b2740"/><text x="22" y="100">·to</text>
        <rect x="52" y="82"  width="38" height="26" rx="4" fill="#1b2740"/><text x="60" y="100">·the</text>
        <rect x="94" y="82"  width="48" height="26" rx="4" fill="#1b2740"/><text x="102" y="100">·shop</text>
        <rect x="146" y="82" width="18" height="26" rx="4" fill="#1b2740"/><text x="154" y="100">.</text>
      </g>
    </g>

    <!-- attention grid -->
    <g transform="translate(280 0)">
      <rect width="260" height="170" rx="14" fill="#0f172a" stroke="#1b2740"/>
      <text x="14" y="26" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8493b3">Attention · 12×12</text>
      <g transform="translate(14 38)">
        <!-- 12×12 cells -->
        <g id="att-cells"></g>
        <!-- generate via inline SVG: 12 rows × 12 cols, cell 9.5×9.5 with 1px gap -->
        <g>
          <!-- programmatically-feeling but inline (12*12 = 144 cells) -->
          <!-- We'll just draw a gradient block and a few accent cells. -->
          <rect width="230" height="120" rx="6" fill="#1b2740"/>
          <!-- highlight a few "interesting" heads with teal -->
          <rect x="170" y="80" width="14" height="14" rx="2" fill="#2dd4bf"/>
          <rect x="184" y="80" width="14" height="14" rx="2" fill="#2dd4bf" opacity="0.7"/>
          <rect x="20" y="20" width="14" height="14" rx="2" fill="#2dd4bf" opacity="0.5"/>
          <rect x="80" y="60" width="14" height="14" rx="2" fill="#2dd4bf" opacity="0.6"/>
        </g>
      </g>
    </g>

    <!-- logit lens -->
    <g transform="translate(560 0)">
      <rect width="260" height="170" rx="14" fill="#0f172a" stroke="#1b2740"/>
      <text x="14" y="26" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8493b3">Logit lens · L0 → L11</text>
      <g transform="translate(14 38)">
        <!-- 12 rows showing brightness gradient bottom-up -->
        <g>
          <rect width="230" height="10" y="0" fill="#2dd4bf" rx="2"/>
          <rect width="230" height="10" y="11" fill="#2dd4bf" opacity="0.9" rx="2"/>
          <rect width="230" height="10" y="22" fill="#2dd4bf" opacity="0.8" rx="2"/>
          <rect width="230" height="10" y="33" fill="#2dd4bf" opacity="0.6" rx="2"/>
          <rect width="230" height="10" y="44" fill="#2dd4bf" opacity="0.5" rx="2"/>
          <rect width="230" height="10" y="55" fill="#1b2740" rx="2"/>
          <rect width="230" height="10" y="66" fill="#1b2740" rx="2"/>
          <rect width="230" height="10" y="77" fill="#1b2740" rx="2"/>
          <rect width="230" height="10" y="88" fill="#1b2740" rx="2"/>
          <rect width="230" height="10" y="99" fill="#1b2740" rx="2"/>
          <rect width="230" height="10" y="110" fill="#1b2740" rx="2"/>
        </g>
      </g>
    </g>

    <!-- sampling -->
    <g transform="translate(840 0)">
      <rect width="260" height="170" rx="14" fill="#0f172a" stroke="#1b2740"/>
      <text x="14" y="26" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8493b3">Sampling · top-10</text>
      <g transform="translate(14 40)">
        <rect width="22" height="100" x="0"  fill="#2dd4bf" rx="2"/>
        <rect width="22" height="60"  x="26" y="40" fill="#0d9488" rx="2"/>
        <rect width="22" height="35"  x="52" y="65" fill="#0d9488" opacity="0.8" rx="2"/>
        <rect width="22" height="22"  x="78" y="78" fill="#0d9488" opacity="0.7" rx="2"/>
        <rect width="22" height="14"  x="104" y="86" fill="#0d9488" opacity="0.6" rx="2"/>
        <rect width="22" height="10"  x="130" y="90" fill="#0d9488" opacity="0.5" rx="2"/>
        <rect width="22" height="7"   x="156" y="93" fill="#0d9488" opacity="0.4" rx="2"/>
        <rect width="22" height="5"   x="182" y="95" fill="#0d9488" opacity="0.35" rx="2"/>
        <rect width="22" height="4"   x="208" y="96" fill="#0d9488" opacity="0.3" rx="2"/>
      </g>
    </g>
  </g>
</svg>
