<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>prompt-x-ray</title>
    <style>
      body { margin: 0; background: #0b1220; color: #dde3f0; font-family: system-ui, sans-serif; }
      main { max-width: 28rem; margin: 4rem auto; padding: 0 1rem; }
      a { color: #5eead4; }
    </style>
    <!--
      GitHub Pages serves this file for any 404. The app only uses ?prompt=
      query-string state, so a deep link like `/?prompt=xyz` lands on
      index.html directly and doesn't hit this page. We keep 404.html
      lightweight: a static "lost?" pointer back to the root, not a JS-driven
      SPA-rewrite trick. That keeps no-JS visitors and crawlers honest.
    -->
  </head>
  <body>
    <main>
      <h1 style="margin: 0 0 0.5rem; font-size: 1.25rem;">404</h1>
      <p style="margin: 0 0 1rem; color: #b6c0d8;">
        That URL isn't part of prompt-x-ray. The app lives at the root.
      </p>
      <p><a href="./">← Back to prompt-x-ray</a></p>
    </main>
  </body>
</html>
