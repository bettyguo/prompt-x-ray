name: Deploy to GitHub Pages

# Builds the Vite production bundle and publishes it to GitHub Pages.
#
# Repo setup required ONCE (Settings → Pages):
#   - Source: "GitHub Actions"
#   - No branch selection needed; this workflow uploads + deploys directly.
#
# Trigger: every push to main, plus manual via the Actions tab.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Standard Pages permissions block — required for actions/deploy-pages@v4.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any in-flight deploy when a newer commit lands, so the live site
# always reflects the latest green build without queuing.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # `/<repo>/` subpath for default GitHub Pages hosting at
          # bettyguo.github.io/prompt-x-ray/. When a custom domain ships
          # (DNS + CNAME), switch VITE_BASE to "/" and update VITE_SITE_URL
          # to that origin in one commit.
          VITE_BASE: /prompt-x-ray/
          VITE_SITE_URL: https://bettyguo.github.io/prompt-x-ray

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
